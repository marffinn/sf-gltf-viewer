<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple GLB Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="font-sans antialiased text-slate-100 bg-slate-900">
    <div id="container"></div>

    <aside id="sidebar" class="fixed top-0 left-0 z-10 h-screen w-80 max-w-[90vw] p-5 flex flex-col gap-5
               bg-slate-900/70 backdrop-blur-xl border-r border-white/10 shadow-2xl
               overflow-y-auto">
        <header class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-fuchsia-500
                        flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21 7.5l-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9" />
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-semibold tracking-tight">GLB Viewer</h1>
                <p class="text-xs text-slate-400">Drop a model to preview</p>
            </div>
        </header>

        <div id="dropzone" class="group relative flex flex-col items-center justify-center gap-3 p-6
                   rounded-2xl border-2 border-dashed border-white/15
                   bg-white/[0.03] hover:bg-white/[0.06] hover:border-indigo-400
                   transition-all duration-200 cursor-pointer text-center">
            <div class="w-12 h-12 rounded-full bg-indigo-500/10 group-hover:bg-indigo-500/20
                        flex items-center justify-center transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-indigo-400" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5-5m0 0l5 5m-5-5v12" />
                </svg>
            </div>
            <div>
                <p class="text-sm font-medium">
                    <span class="text-indigo-400">Click to upload</span>
                    <span class="text-slate-300">or drag &amp; drop</span>
                </p>
                <p class="text-xs text-slate-500 mt-1">.glb, .gltf, or .obj (+ .mtl &amp; textures)</p>
            </div>
            <input id="fileInput" type="file" multiple
                accept=".glb,.gltf,.obj,.mtl,.png,.jpg,.jpeg,.bmp,.tga,.webp,model/gltf-binary,model/gltf+json"
                class="absolute inset-0 opacity-0 cursor-pointer" />
        </div>

        <div>
            <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 px-1">
                Sample Models
            </h2>
            <ul id="model-list" class="flex flex-col gap-1">
                <li>
                    <a href="assets/lxk/LXK.glb" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm
                               text-slate-200 hover:bg-white/[0.08] hover:text-white
                               transition-colors">
                        <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
                        LXK 10 160
                    </a>
                </li>
            </ul>
        </div>

        <div>
            <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 px-1">
                Lights
            </h2>
            <div id="light-controls" class="flex flex-col gap-3 px-1">
                <!-- Slider rows are populated by buildLightControls() -->
            </div>
        </div>

        <footer class="mt-auto pt-4 border-t border-white/10 text-xs text-slate-500">
            Built with Three.js &amp; Tailwind CSS
        </footer>
    </aside>

    <div id="dragOverlay" class="fixed inset-0 z-30 hidden items-center justify-center
               bg-slate-900/70 backdrop-blur-sm pointer-events-none">
        <div class="px-10 py-8 rounded-3xl border-2 border-dashed border-indigo-400
                    bg-slate-900/80 text-center">
            <p class="text-2xl font-semibold text-white">Drop your model to load</p>
            <p class="text-sm text-slate-400 mt-1">.glb, .gltf, or .obj (+ .mtl &amp; textures)</p>
        </div>
    </div>

    <div id="loadingIndicator" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 hidden
               px-6 py-5 rounded-2xl bg-slate-900/80 backdrop-blur-xl
               border border-white/10 shadow-2xl text-center min-w-[260px]">
        <div class="flex items-center justify-center gap-2 mb-3 text-sm text-slate-200">
            <svg class="animate-spin w-4 h-4 text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>
            <span>Loading <span id="progressText" class="font-medium text-white">0%</span></span>
        </div>
        <div class="w-full h-2 rounded-full bg-white/10 overflow-hidden">
            <div id="progressBar"
                class="h-full bg-gradient-to-r from-indigo-500 to-fuchsia-500 transition-[width] duration-150"
                style="width: 0%"></div>
        </div>
    </div>

    <script type="module" src="./scripts/script.js"></script>
</body>

</html>
