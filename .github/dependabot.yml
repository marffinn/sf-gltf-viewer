version: 2
updates:
  # Keep npm dependencies (three.js, jquery, vite, gh-pages, …) up to date.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Bundle non-three updates together to reduce noise.
      dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"
